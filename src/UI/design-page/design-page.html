<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanka Jahari's T-Shirts - Design Page</title>
    <link rel="stylesheet" href="design-space.css">

    <style>
        /* --- BEAUTIFICATION STYLES (Keeping the brand look) --- */
        body {
            background-color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            color: #000;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid #ccc;
        }

        .logo { font-size: 28px; font-weight: 900; line-height: 1.1; }

        nav ul { display: flex; list-style: none; gap: 30px; font-size: 14px; font-weight: bold; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: black; }

        .header-right { display: flex; gap: 30px; font-size: 14px; font-weight: bold; }

        /* --- PRODUCT GRID LAYOUT --- */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            gap: 50px;
            padding: 40px 20px;
            align-items: start;
        }

        /* --- OVERLAY LOGIC (Fixed Scaling) --- */
        .shirt-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* Limits the shirt size so it doesn't eat the page */
            margin: 0 auto;
            background-color: #f9f9f9;
        }

        .shirt-container img.base {
            width: 100%;
            display: block;
        }

        /* This is the part that scales the actual graphic */
        .shirt-container img.design {
            position: absolute;
            width: 35%;          /* Adjust this % to scale the design up or down */
            height: auto;        /* Keeps the graphic from stretching */
            top: 22%;            /* Moves design down from the top (Chest placement) */
            left: 50%;           /* Moves design to the middle */
            transform: translateX(-50%); /* Perfectly centers the design horizontally */
            pointer-events: none;
        }

        /* RIGHT SIDE: Controls & E-commerce details */
        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-header h1 {
            font-family: serif;
            font-size: 38px;
            margin: 0 0 10px 0;
            color: #333;
        }

        .info-row {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .info-row label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            display: block;
            margin-bottom: 4px;
        }

        /* Input & Select Styling */
        .config-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            font-size: 13px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field label {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        select, input[type="number"] {
            border: 2px solid black;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 0; /* Square edges */
            width: 100%;
            box-sizing: border-box;
        }

        #submit {
            background-color: black;
            color: white;
            border: none;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
            margin-bottom: 28px;
        }

        /* Form rows */
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
        }

        .form-row label {
            font-size: 13px;
            width: 80px;
            color: #333;
        }

        .form-row input[type="number"],
        .form-row select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            background-color: #f0f0f0;
            font-size: 13px;
            font-family: Georgia, serif;
            width: 180px;
        }

        /* Add to cart button */
        .add-to-cart {
            width: 100%;
            padding: 14px;
            background-color: black;
            color: white;
            border: none;
            font-size: 13px;
            letter-spacing: 0.1em;
            cursor: pointer;
            margin-top: 10px;
            font-family: Georgia, serif;
        }

        .add-to-cart:hover {
            background-color: #333;
        }

        #submit:hover { opacity: 0.8; }

        footer {
            display: flex;
            padding: 40px 60px;
            gap: 40px;
            border-top: 1px solid #ccc;
            margin-top: 40px;
            font-size: 13px;
        }

        .footer-logo {
            font-size: 15px;
            font-weight: bold;
            line-height: 1.4;
            width: 160px;
        }

        .footer-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-col h4 {
            font-size: 12px;
            color: #888;
            margin: 0 0 8px 0;
            font-weight: normal;
            letter-spacing: 0.05em;
        }

        .footer-col ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-col ul li a,
        .footer-col ul li {
            text-decoration: none;
            color: #333;
            font-size: 12px;
            cursor: pointer;
        }

        .footer-col ul li:hover {
            text-decoration: underline;
        }

        .credits {
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #eee;
            padding: 16px 0 0;
            margin-top: 10px;
        }

    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">Tanka Jahari's<br>T-Shirts</div>
    <nav>
        <ul>
            <li><a href="../../../home.html">Home</a></li>
            <li><a href="../design-page/design-page.html">Products</a></li>
            <li><a href="../Our story page/Our story page.html">About Us</a></li>
        </ul>
    </nav>
    <div class="header-right">
        <button id="account-btn" class="account-btn">Login</button>
    </div>
</header>

<!-- PRODUCT SECTION -->
<div class="product-section">

    <!-- LEFT: Shirt image -->
    <div class="product-left">
        <div class="shirt-container">
            <img class="base" src="../../../asset/shirt-color/shirt-blue.png" alt="Shirt">
            <img class="design" src="../../../asset/print-design/design-1.png" alt="Design">
        </div>
    </div>

    <div class="controls-panel">
        <div class="product-header">
            <h1>Graphic Tee</h1>
        </div>

        <div class="info-row">
            <label>In Stock</label>
            <span id="count">—</span>
        </div>

        <div class="info-row">
            <label>Price</label>
            <span id="price">—</span>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">

        <div class="config-group">
            <div class="field">
                <label for="size">Size</label>
                <select name="size" id="size">
                    <option value="2XS">2XS</option>
                    <option value="XS">XS</option>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL" selected>XL</option>
                    <option value="2XL">2XL</option>
                    <option value="3XL">3XL</option>
                </select>
            </div>

            <div class="field">
                <label for="color">Color</label>
                <select name="color" id="color">
                    <option value="blue">Blue</option>
                    <option value="green">Green</option>
                    <option value="pink">Pink</option>
                    <option value="red">Red</option>
                </select>
            </div>

            <div class="field">
                <label for="design">Design</label>
                <select name="design" id="design">
                    <option value="Design-1">Design 1</option>
                    <option value="Design-2">Design 2</option>
                    <option value="Design-3">Design 3</option>
                    <option value="Design-4">Design 4</option>
                    <option value="Design-5">Design 5</option>
                    <option value="Design-6">Design 6</option>
                    <option value="Design-7">Design 7</option>
                    <option value="Design-8">Design 8</option>
                    <option value="Design-9">Design 9</option>
                </select>
            </div>

            <div class="field">
                <label for="quantity">Quantity</label>
                <input id="quantity" type="number" value="1" min="1" max="999">
            </div>

            <button id="submit">Add to Cart</button>
        </div>
    </div>
</main>

<footer>
    <div class="footer-logo">Tanka Jahari's<br>T-Shirts</div>
    <div class="footer-col">
        <h4>Resources</h4>
        <ul>
            <li>Return Policy</li>
            <li>Tanka Order</li>
            <li>Tanka's Autobiography</li>
        </ul>
    </div>
    <div class="footer-col">
        <h4>About</h4>
        <ul>
            <li>Our Story</li>
            <li>Contact Us (Pls Don't)</li>
        </ul>
    </div>
    <div class="credits">Designed by Rockstar Sol!</div>
</footer>

<script src="design-page.js"></script>
<script src="../header.js"></script>
</body>
</html>
