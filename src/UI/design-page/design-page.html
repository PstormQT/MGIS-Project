<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Page</title>
    <link rel="stylesheet" href="design-space.css">
    <style>
        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.1;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
            font-size: 14px;
            font-weight: bold;
            padding: 0;
            margin: 0;
        }

        nav a {
            text-decoration: none;
            color: black;
        }

        .header-right {
            display: flex;
            gap: 30px;
            font-size: 14px;
            font-weight: bold;
        }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid #eee;
            padding: 60px 50px 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 20px;
        }

        .footer-logo {
            font-weight: 900;
            font-size: 20px;
        }

        .footer-col h4 {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }

        .footer-col ul {
            list-style: none;
            padding: 0;
            font-size: 14px;
            line-height: 2;
            font-weight: bold;
        }

        .credits {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 10px;
            color: #aaa;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Tanka Jahari's<br>T-Shirts</div>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">Products</a></li>
                <li><a href="/">About Us</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <span>Search</span>
            <span>Cart (0)</span>
        </div>
    </header>
    
    <div class="shirt-container">
        <img class="base" src="../../../asset/shirt-color/shirt-blue.png">
        <img class="design" src="../../../asset/print-design/design-1.png">
    </div>

    <!-- Display Shirt amount -->
    <label for="count">In Stock: </label>
    <span id="count">—</span>
    <br>

    <!-- Quantity input -->
    <label for="quantity">Quantity: </label>
    <input id="quantity" type="number" value="1" min="1" max="999">
    <br>

    <!-- Choosing size option -->
    <label for="size">Size: </label>
    <select name="size" id="size">
        <option value="2XS">2XS</option>
        <option value="XS">XS</option>
        <option value="S">S</option>
        <option value="M">M</option>
        <option value="L">L</option>
        <option value="XL" selected>XL</option>
        <option value="2XL">2XL</option>
        <option value="3XL">3XL</option>
    </select>
    <br>

    <!-- Choosing color option -->
    <label for="color">Color: </label>
    <select name="color" id="color">
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="pink">Pink</option>
        <option value="red">Red</option>
    </select>
    <br>

    <!-- Choosing design option -->
    <label for="design">Design: </label>
    <select name="design" id="design">
        <option value="Design-1">Design 1</option>
        <option value="Design-2">Design 2</option>
        <option value="Design-3">Design 3</option>
        <option value="Design-4">Design 4</option>
        <option value="Design-5">Design 5</option>
        <option value="Design-6">Design 6</option>
        <option value="Design-7">Design 7</option>
        <option value="Design-8">Design 8</option>
        <option value="Design-9">Design 9</option>
    </select>
    <br>

    <!-- Submit button -->
    <button id="submit">Add to Cart</button>

    <footer>
        <div class="footer-logo">Tanka Jahari's<br>T-Shirts</div>

        <div class="footer-col">
            <h4>Resources</h4>
            <ul>
                <li>Return Policy</li>
                <li>Tanka Order</li>
                <li>Tanka's Autobiography</li>
            </ul>
        </div>

        <div class="footer-col">
            <h4>About</h4>
            <ul>
                <li>Our Story</li>
                <li>Contact Us (Pls Don't)</li>
            </ul>
        </div>

        <div class="credits">Designed by Rockstar Sol!</div>
    </footer>

    <script src="design-page.js"></script>
    <script src="/src/UI/header.html"></script>
</body>
</html>
