<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanka Jahari's T-Shirts - Login</title>
    <style>
        /* --- BASE STYLES --- */
        body {
            background-color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            color: #000;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.1;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
            font-size: 14px;
            font-weight: bold;
            padding: 0;
            margin: 0;
        }

        nav a {
            text-decoration: none;
            color: black;
        }

        .header-right {
            display: flex;
            gap: 30px;
            font-size: 14px;
            font-weight: bold;
        }

        /* --- LOGIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            font-family: serif;
            font-size: 42px;
            color: #666;
            margin-bottom: 30px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-form input {
            border: 2px solid black;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 0; /* Square edges as requested */
            outline: none;
        }

        .login-form input:focus {
            background-color: #f9f9f9;
        }

        .login-btn {
            background-color: black;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.8;
        }

        .signup-prompt {
            margin-top: 30px;
            font-size: 14px;
        }

        .signup-prompt a {
            color: black;
            font-weight: bold;
            text-decoration: underline;
        }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid #eee;
            padding: 60px 50px 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 20px;
        }

        .footer-logo {
            font-weight: 900;
            font-size: 20px;
        }

        .footer-col h4 {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }

        .footer-col ul {
            list-style: none;
            padding: 0;
            font-size: 14px;
            line-height: 2;
            font-weight: bold;
        }

        .credits {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 10px;
            color: #aaa;
            margin-top: 40px;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            header, footer { flex-direction: column; text-align: center; padding: 20px; }
            nav ul { margin: 20px 0; }
            footer { grid-template-columns: 1fr; gap: 40px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Tanka Jahari's<br>T-Shirts</div>
    <nav>
        <ul>
            <li><a href="../../../home.html">Home</a></li>
            <li><a href="../design-page/design-page.html">Products</a></li>
            <li><a href="../Our story page/Our story page.html">About Us</a></li>
        </ul>
    </nav>
    <div class="header-right">
        <span>Search</span>
        <span>Cart (4)</span>
    </div>
</header>

<main class="main-content">
    <div class="login-container">
        <h2>Welcome Back.</h2>
        <form id="login-form" class="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">LOGIN</button>
        </form>

        <div class="signup-prompt">
            <span>Need to make an account? </span>
            <a href="../create-account/create-account.html">Sign Up</a>
        </div>
    </div>
</main>

<footer>
    <div class="footer-logo">Tanka Jahari's<br>T-Shirts</div>

    <div class="footer-col">
        <h4>Resources</h4>
        <ul>
            <li>Return Policy</li>
            <li>Tanka Order</li>
            <li>Tanka's Autobiography</li>
        </ul>
    </div>

    <div class="footer-col">
        <h4>About</h4>
        <ul>
            <li>Our Story</li>
            <li>Contact Us (Pls Don't)</li>
        </ul>
    </div>

    <div class="credits">Designed by Rockstar Sol!</div>
</footer>

<script src="login.js"></script>
<script src="../header.js"></script>

</body>
</html>
