<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Title</title>
    <link rel= "stylesheet" href= "design-space.css">
</head>

<body>

    <div class = "shirt-container">
        <img class="base" src="asset/shirt-color/shirt-blue.png">
        <img class="design" src="asset/print-design/Tanka.png">
        
    </div>

    <!-- Choosing size option -->
    <label for = "size">Size: </label>
    <select name = "size" id = "size">
        <option value = "3XS">3XS</option>
        <option value = "2XS">2XS</option>
        <option value = "XS">XS</option>
        <option value = "S">S</option>
        <option value = "M">M</option>
        <option value = "L">L</option>
        <option value selected = "XL">XL</option>
        <option value = "2XL">2XL</option>
        <option value = "3XL">3XL</option>
    </select>
    <br>
    <!-- Choosing color option -->
     <label for = "color">Color: </label>
     <select name = "color" id = "color">
        <option value = "Blue">Blue</option>
        <option value = "Green">Green</option>
        <option value = "Pink">Pink</option>
        <option value = "Red">Red</option>
    </select>
    <br>
    <!-- Choosing design option -->
     <label for = "design">Design: </label>
     <select name = "design" id = "design">
        <option value = "Tanka">Tanka</option>
        <option value = "meme2">meme2</option>
        <option value = "meme3">meme3</option>
        <option value = "meme4">meme4</option>
        <option value = "meme5">meme5</option>
        <option value = "meme6">meme6</option>
        <option value = "meme7">meme7</option>
        <option value = "meme8">meme8</option>
        <option value = "meme9">meme9</option>
    </select>
    <br>
</body>
</html>
