name: SFTP Deploy on Changes

on:
  push:
    branches:
      - main  # Only triggers on main branch
      - Peter-branch
      - joe-fart-branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Add SFTP host to known_hosts
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p $SFTP_PORT $SFTP_HOST >> ~/.ssh/known_hosts

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_TARGET: "/home/ptd7904/www/MGIS445/project/"
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          echo "Starting deployment..."
          lftp -u $SFTP_USERNAME,$SFTP_PASSWORD -p $SFTP_PORT sftp://$SFTP_HOST <<EOF
          mirror -R --delete --verbose \
            --exclude-glob .git* \
            --exclude-glob .github* \
            --exclude-glob .idea* \
            --exclude-glob testing* \
            ./ $SFTP_TARGET
          bye
          EOF
